<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoAI Dashboard</title>

<style>

/* ===== GLOBAL ===== */
:root {
  --bg: #070b14;
  --card: rgba(255,255,255,0.05);
  --text: #ffffff;
  --muted: #9ca3af;
  --accent: #7c3aed;
}

.light {
  --bg: #f1f5f9;
  --card: white;
  --text: #0f172a;
  --muted: #475569;
}

body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ===== TOPBAR ===== */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  backdrop-filter: blur(10px);
}

.logo {
  font-weight:700;
  font-size:20px;
}

.user {
  font-size:14px;
  color:var(--muted);
}

/* ===== SETTINGS ===== */
.settings {
  position:absolute;
  right:20px;
  top:70px;
  background:var(--card);
  padding:15px;
  border-radius:12px;
  display:none;
}

.settings button {
  width:100%;
  margin-top:8px;
}

/* ===== CARDS ===== */
.grid {
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:var(--card);
  padding:20px;
  border-radius:15px;
  backdrop-filter: blur(15px);
}

.big {
  font-size:28px;
  font-weight:bold;
}

/* ===== BUTTON ===== */
.btn {
  padding:12px;
  background:linear-gradient(135deg,#7c3aed,#06b6d4);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
  <div class="logo">🚀 CryptoAI</div>
  <div>
    <span id="username">Loading...</span>
    <button onclick="toggleSettings()">⚙️</button>
  </div>
</div>

<div id="settings" class="settings">
  <button onclick="toggleTheme()">🌗 Toggle Theme</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="grid">

  <div class="card">
    <div class="big">AI Score</div>
    <p>--%</p>
  </div>

  <div class="card">
    <div class="big">Win Rate</div>
    <p>--%</p>
  </div>

  <div class="card">
    <div class="big">Trades</div>
    <p>0</p>
  </div>

  <div class="card">
    <div class="big">Upload</div>
    <button class="btn">Upload Screenshot</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "earncrypto-26d59.firebaseapp.com",
  projectId: "earncrypto-26d59"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* USER LOAD */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));
  document.getElementById("username").innerText =
    snap.exists() ? snap.data().username : user.email;
});

/* SETTINGS */
window.toggleSettings = () => {
  const s = document.getElementById("settings");
  s.style.display = s.style.display === "block" ? "none" : "block";
};

/* THEME */
window.toggleTheme = () => {
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light"));
};

if (localStorage.getItem("theme") === "true") {
  document.body.classList.add("light");
}

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
  </html>
