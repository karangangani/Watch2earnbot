<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - TradeNova AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="logo" style="font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px;">
      🌌 TradeNova AI
    </div>
    <div class="topbar-right">
      <span class="user-greeting">Welcome, <span id="display-username">Loading...</span></span>
      <button id="btn-settings" class="icon-btn">⚙️</button>
      
      <!-- Settings Menu -->
      <div id="settings-menu" class="settings-dropdown glass">
        <button id="btn-theme" class="btn secondary">🌗 Toggle Theme</button>
        <button id="btn-logout" class="btn secondary" style="color: var(--red); border-color: rgba(239,68,68,0.3);">🚪 Logout</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="dashboard-grid">
    
    <!-- Left Column: AI Analysis -->
    <div class="main-content">
      <div class="card glass">
        <h2>Chart Analysis</h2>
        <p class="subtitle" style="margin-bottom: 20px;">Upload a trading chart screenshot to get instant AI signals.</p>
        
        <label class="upload-area" id="upload-container">
          <div id="upload-placeholder">
            <span style="font-size: 30px;">📸</span>
            <p style="margin-top: 10px; font-weight: 500;">Click to Upload Screenshot</p>
            <p class="subtitle">PNG, JPG up to 5MB</p>
          </div>
          <img id="preview-image" alt="Chart Preview" />
          <input type="file" id="file-upload" accept="image/*" style="display: none;" />
        </label>

        <button id="btn-analyze" class="btn primary" style="width: 100%; display: none;">Analyze Chart</button>
        
        <div id="loading-spinner" class="loader"></div>

        <!-- AI Result Card -->
        <div id="result-card" class="result-card glass" style="background: rgba(0,0,0,0.1);">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin-bottom: 5px;">AI Verdict</h3>
            <span id="res-signal" class="signal-badge signal-buy">BUY</span>
          </div>
          <p id="res-reason" class="subtitle" style="color: var(--text);">Analyzing pattern structure...</p>
          
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-label">Confidence</div>
              <div id="res-confidence" class="stat-value">--%</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">Detected Trend</div>
              <div id="res-trend" class="stat-value">--</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column: Live News -->
    <aside class="sidebar">
      <div class="card glass">
        <h3 style="margin-bottom: 15px;">📰 Live Market News</h3>
        <div id="news-container">
          <p class="subtitle">Loading news...</p>
        </div>
      </div>
    </aside>

  </main>

  <script type="module" src="dashboard.js"></script>
</body>
  </html>
