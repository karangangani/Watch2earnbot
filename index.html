<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeNox AI - Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="brand-header">
        <h2 class="brand-name">TradeNox</h2>
        <h1>Start building today</h1>
        <p>Join thousands of traders who've already<br>optimized their trades</p>
      </div>

      <div class="toggle-tabs">
        <button id="tab-login" class="tab active">Sign In</button>
        <button id="tab-register" class="tab">Register</button>
      </div>

      <form id="auth-form">
        <div id="username-container" class="input-group hidden">
          <label>Username</label>
          <div class="input-wrapper">
            <span class="icon">👤</span>
            <input type="text" id="username" placeholder="Enter your username" />
          </div>
        </div>

        <div class="input-group">
          <label>Email</label>
          <div class="input-wrapper">
            <span class="icon">✉️</span>
            <input type="email" id="email" placeholder="Enter your email" />
          </div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" />
            <span class="eye-icon">👁️</span>
          </div>
        </div>

        <div class="auth-options" id="auth-options">
          <label class="remember">
            <input type="checkbox"> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="button" id="btn-submit" class="btn-primary-auth">Sign In</button>

        <div class="divider-text"><span>Or</span></div>

        <button type="button" id="btn-google" class="btn-social">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="18"/>
          Sign In with Google
        </button>
        
        <button type="button" class="btn-social">
          <img src="https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg" alt="GitHub" width="18"/>
          Sign In with GitHub
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
          </html>
