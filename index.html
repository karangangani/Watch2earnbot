<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeNova AI - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container shell">
    <div class="card glass">
      <div class="brand">
        <div class="logo">🌌</div>
        <h1>TradeNova AI</h1>
        <p class="subtitle">Next-Gen Crypto Analysis</p>
      </div>

      <form id="auth-form" class="grid">
        <!-- Username is required for signup -->
        <input type="text" id="username" placeholder="Username (Required for Sign Up)" autocomplete="nickname" />
        <input type="email" id="email" placeholder="Email address" autocomplete="email" required />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
        
        <div class="actions">
          <button type="button" id="btn-signup" class="btn primary">Sign Up</button>
          <button type="button" id="btn-login" class="btn secondary">Login</button>
        </div>

        <button type="button" id="btn-forgot" class="btn-text">Forgot Password?</button>

        <div class="divider"><span>OR</span></div>

        <button type="button" id="btn-google" class="btn google">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="18"/>
          Continue with Google
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
          </html>
