<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CryptoAI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="brand">
        <div class="logo">🚀</div>
        <h1>CryptoAI</h1>
        <p>Secure login for your dashboard</p>
      </div>

      <div class="grid">
        <input type="text" id="username" placeholder="Choose username" autocomplete="nickname" />
        <input type="email" id="email" placeholder="Email address" autocomplete="email" />
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      </div>

      <div class="actions">
        <button class="primary" type="button" onclick="signup()">Sign Up</button>
        <button class="secondary" type="button" onclick="login()">Login</button>
      </div>

      <button class="linkbtn" type="button" onclick="forgotPassword()">Forgot Password?</button>

      <div class="divider"><span>OR</span></div>

      <button class="google" type="button" onclick="googleLogin()">Continue with Google</button>
      <button class="danger" type="button" onclick="logout()">Logout</button>

      <section class="status">
        <div class="label">Status</div>
        <div id="status">Not logged in</div>
        <div id="dashboardName" class="name"></div>
      </section>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
        </html>
